<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4CAF50">
<title>錬成カウンター</title>

<style>
body { font-family: sans-serif; text-align: center; margin-top: 50px; }
button { margin: 10px; padding: 15px 25px; font-size: 18px; }
.counter { margin-top: 20px; font-size: 18px; }
</style>
</head>

<body>
<h1>錬成カウンター</h1>

<button onclick="count('physical')">体力錬成</button>
<button onclick="count('english')">英語錬成</button>
<button onclick="count('other')">その他</button>

<div class="counter">
<p>総回数: <span id="total">0</span></p>
<p>英語錬成: <span id="english">0</span></p>
<p>体力錬成: <span id="physical">0</span></p>
<p>その他: <span id="other">0</span></p>
<p>本日の総回数: <span id="daily">0</span></p>
</div>

<script>
let data = JSON.parse(localStorage.getItem("counterData")) || {
  total: 0,
  english: 0,
  physical: 0,
  other: 0,
  daily: 0,
  lastDate: new Date().toDateString()
};

function checkDate() {
  const today = new Date().toDateString();
  if (data.lastDate !== today) {
    data.daily = 0;
    data.lastDate = today;
  }
}

function count(type) {
  checkDate();
  data.total++;
  data[type]++;
  data.daily++;
  saveAndUpdate();
}

function saveAndUpdate() {
  localStorage.setItem("counterData", JSON.stringify(data));
  document.getElementById("total").textContent = data.total;
  document.getElementById("english").textContent = data.english;
  document.getElementById("physical").textContent = data.physical;
  document.getElementById("other").textContent = data.other;
  document.getElementById("daily").textContent = data.daily;
}

checkDate();
saveAndUpdate();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>
</body>
</html>
